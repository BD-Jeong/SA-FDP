[Version]
rocksdb_version=6.2.2

[DBOptions]
use_direct_reads=true
use_direct_io_for_flush_and_compaction=true
create_if_missing=true
max_open_files=-1
max_background_jobs=16
max_subcompactions=8

[CFOptions "default"]
compression=kNoCompression
bottommost_compression=kNoCompression
compaction_style=kCompactionStyleLevel
level_compaction_dynamic_level_bytes=true
compaction_pri=kOldestLargestSeqFirst
write_buffer_size=134217728      # 128 MiB
max_write_buffer_number=6
min_write_buffer_number_to_merge=1
level0_file_num_compaction_trigger=6
level0_slowdown_writes_trigger=20
level0_stop_writes_trigger=32
max_bytes_for_level_base=2147483648     # 2GB
max_bytes_for_level_multiplier=10
target_file_size_base=134217728         # 128MB
target_file_size_multiplier=2

[TableOptions/BlockBasedTable "default"]
no_block_cache=true

[CFOptions "usertable"]
compression=kNoCompression
bottommost_compression=kNoCompression
compaction_style=kCompactionStyleLevel
level_compaction_dynamic_level_bytes=true
compaction_pri=kOldestLargestSeqFirst
write_buffer_size=134217728      # 128 MiB
max_write_buffer_number=6
min_write_buffer_number_to_merge=1
level0_file_num_compaction_trigger=6
level0_slowdown_writes_trigger=20
level0_stop_writes_trigger=32
max_bytes_for_level_base=2147483648     # 2GB
max_bytes_for_level_multiplier=10
target_file_size_base=134217728         # 128MB
target_file_size_multiplier=2

[TableOptions/BlockBasedTable "usertable"]
no_block_cache=true